version: 0.2

env:
  variables:
    IMAGE_TAG: latest

phases:

  install:
    runtime-versions:
      php: 8.2
    commands:
      - echo "Installing Composer..."
      - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer

      - echo "Installing dependencies..."
      - composer install --no-interaction --prefer-dist --ignore-platform-req=ext-gmp

  pre_build:
    commands:
      - echo "Running tests (if available)..."
      - |
        if [ -f ./vendor/bin/phpunit ]; then
          php ./vendor/bin/phpunit --testdox --colors=never 2>&1 | tee phpunit-results.txt
        else
          echo "PHPUnit not found, skipping tests." | tee phpunit-results.txt
        fi

      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION \
        | docker login --username AWS --password-stdin $(echo $ECR_REPO_URI | cut -d/ -f1)

      - echo "Setting image tag..."
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG_VERSIONED=v$COMMIT_HASH
      - echo "Image tag: $IMAGE_TAG_VERSIONED"

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t $ECR_REPO_URI:$IMAGE_TAG_VERSIONED .
      - docker tag $ECR_REPO_URI:$IMAGE_TAG_VERSIONED $ECR_REPO_URI:latest

  post_build:
    commands:
      - echo "Pushing image to ECR..."
      - docker push $ECR_REPO_URI:$IMAGE_TAG_VERSIONED
      - docker push $ECR_REPO_URI:latest

      - echo "Generating imagedefinitions.json..."
      - printf '[{"name":"finpay-container","imageUri":"%s"}]' $ECR_REPO_URI:$IMAGE_TAG_VERSIONED > imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - phpunit-results.txt
