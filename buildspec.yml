version: 0.2
# -------------------------------------------------------
# Finpay Technologies - CodeBuild Build Specification
# Builds the PHP application Docker image, runs PHPUnit
# tests, pushes the image to ECR, and produces the
# imagedefinitions.json file for ECS deployment.
# -------------------------------------------------------

env:
  variables:
    IMAGE_TAG: latest
  # These are injected by CodePipeline / CodeBuild environment
  # AWS_ACCOUNT_ID, AWS_DEFAULT_REGION, ECR_REPO_URI, ENVIRONMENT

phases:

  # ── Install Phase ──────────────────────────────────────
  install:
    runtime-versions:
      php: 8.2
    commands:
      - echo "Installing Composer dependencies..."
      - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
      - composer install --no-interaction --prefer-dist

  # ── Pre-Build Phase ────────────────────────────────────
  pre_build:
    commands:
      - echo "Running PHPUnit tests..."
      - ./vendor/bin/phpunit --testdox --colors=never 2>&1 | tee phpunit-results.txt
      - echo "PHPUnit tests completed."

      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

      - echo "Setting image tag from commit hash..."
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG_VERSIONED=v$COMMIT_HASH
      - echo "Image tag - $IMAGE_TAG_VERSIONED"

  # ── Build Phase ────────────────────────────────────────
  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t $ECR_REPO_URI:$IMAGE_TAG_VERSIONED .
      - docker tag $ECR_REPO_URI:$IMAGE_TAG_VERSIONED $ECR_REPO_URI:latest
      - echo "Docker image built successfully."

  # ── Post-Build Phase ───────────────────────────────────
  post_build:
    commands:
      - echo "Pushing Docker image to ECR..."
      - docker push $ECR_REPO_URI:$IMAGE_TAG_VERSIONED
      - docker push $ECR_REPO_URI:latest
      - echo "Image pushed successfully - $ECR_REPO_URI:$IMAGE_TAG_VERSIONED"

      - echo "Writing imagedefinitions.json for ECS deployment..."
      - printf '[{"name":"backend","imageUri":"%s"}]' $ECR_REPO_URI:$IMAGE_TAG_VERSIONED > imagedefinitions.json
      - cat imagedefinitions.json

      - echo "Build complete."

# ── Artifacts ──────────────────────────────────────────
artifacts:
  files:
    - imagedefinitions.json
    - phpunit-results.txt
  discard-paths: yes

# ── Reports ────────────────────────────────────────────
reports:
  phpunit-report:
    files:
      - phpunit-results.txt
    discard-paths: yes

# ── Cache ──────────────────────────────────────────────
cache:
  paths:
    - vendor/**/*
